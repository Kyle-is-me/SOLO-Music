<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLO音乐</title>
  <link rel="icon" href="src/assets/logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-logo">
        <img src="src/assets/logo.png" alt="SOLO">
        <span>SOLO音乐</span>
      </div>
      <div id="sidebar-nav">
        <div class="nav-item active" id="nav-local">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v18M3 12h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
          <span>本地音乐</span>
        </div>
        <div class="nav-item" id="nav-online">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/></svg>
          <span>在线音乐</span>
        </div>
        <div class="nav-item" id="nav-favorites">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/></svg>
          <span>我的收藏</span>
        </div>
      </div>
      <div id="sidebar-playlist-header">
        <span>播放列表</span>
        <div id="playlist-actions">
          <button id="add-music-btn" title="添加音乐">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          </button>
          <button id="add-folder-btn" title="添加文件夹">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 7V5a2 2 0 012-2h4l2 2h6a2 2 0 012 2v2M3 7h18a2 2 0 012 2v8a2 2 0 01-2 2H3a2 2 0 01-2-2V9a2 2 0 012-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="clear-list-btn" title="清空列表">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div id="playlist-list"></div>
      <div id="sidebar-user">
        <div id="user-info" style="display:none">
          <div id="user-avatar"></div>
          <div id="user-name"></div>
          <button id="logout-btn" title="退出登录">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" fill="currentColor"/></svg>
          </button>
        </div>
        <button id="login-btn" class="btn-login" title="登录">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="currentColor"/></svg>
          <span>登录</span>
        </button>
      </div>
      <div id="sidebar-theme">
        <span class="theme-label">主题</span>
        <div id="theme-options">
          <button class="theme-dot active" data-theme="indigo" style="background:#5B5EA6" title="靛蓝"></button>
          <button class="theme-dot" data-theme="blue" style="background:#4A90D9" title="蓝色"></button>
          <button class="theme-dot" data-theme="yellow" style="background:#E6B422" title="黄色"></button>
          <button class="theme-dot" data-theme="pink" style="background:#E8668A" title="粉色"></button>
        </div>
      </div>
    </div>

    <div id="main-content">
      <div id="player-view">
        <div id="album-section">
          <div id="album-disc">
            <div id="album-art">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M9 18V5l12-2v13" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><circle cx="6" cy="18" r="3" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><circle cx="18" cy="16" r="3" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></svg>
            </div>
          </div>
          <div id="song-detail">
            <div id="song-title">未在播放</div>
            <div id="song-artist">--</div>
          </div>
        </div>

        <div id="lyrics-section">
          <div id="lyrics-header">
            <span>歌词</span>
            <button id="load-lyric-btn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
              加载歌词
            </button>
          </div>
          <div id="lyrics-content"></div>
        </div>
      </div>

      <div id="online-view" class="view-container" style="display:none">
        <div id="online-header">
          <h2>在线音乐</h2>
          <div id="search-bar">
            <input type="text" id="search-input" placeholder="搜索歌曲、歌手...">
            <button id="search-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
        <div id="search-results" style="display:none"></div>
        <div id="playlist-grid"></div>
        <div id="playlist-detail" style="display:none">
          <div id="playlist-detail-header">
            <button id="playlist-back-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg>
              返回
            </button>
            <div id="playlist-detail-info"></div>
            <button id="play-all-btn" class="btn-primary btn-sm">播放全部</button>
          </div>
          <div id="playlist-detail-songs"></div>
        </div>
      </div>

      <div id="favorites-view" class="view-container" style="display:none">
        <div id="favorites-header">
          <h2>我的收藏</h2>
        </div>
        <div id="favorites-list"></div>
      </div>
    </div>
  </div>

  <div id="control-bar">
    <div id="control-song-info">
      <div id="control-album-art">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 18V5l12-2v13" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/><circle cx="6" cy="18" r="3" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/><circle cx="18" cy="16" r="3" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/></svg>
      </div>
      <div id="control-song-text">
        <div id="control-song-title">未在播放</div>
        <div id="control-song-artist">--</div>
      </div>
      <button id="favorite-btn" title="收藏">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-favorite-outline"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke="currentColor" stroke-width="2"/></svg>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-favorite-filled" style="display:none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="var(--accent)"/></svg>
      </button>
    </div>

    <div id="control-center">
      <div id="control-buttons">
        <button id="mode-btn" title="顺序播放">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-sequential"><path d="M8 5l-5 5 5 5M16 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-loop"><path d="M17 1l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11V9a4 4 0 014-4h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M7 23l-4-4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 13v2a4 4 0 01-4 4H3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-loop-one"><path d="M17 1l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11V9a4 4 0 014-4h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M7 23l-4-4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 13v2a4 4 0 01-4 4H3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><text x="12" y="15" text-anchor="middle" font-size="8" font-weight="bold" fill="currentColor">1</text></svg>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-shuffle"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="prev-btn" title="上一首">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19 20L9 12l10-8v16zM5 4v16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="play-btn" title="播放">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon-play"><polygon points="6,3 20,12 6,21" fill="currentColor"/></svg>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon-pause" style="display:none"><rect x="5" y="3" width="4" height="18" rx="1" fill="currentColor"/><rect x="15" y="3" width="4" height="18" rx="1" fill="currentColor"/></svg>
        </button>
        <button id="next-btn" title="下一首">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 4l10 8-10 8V4zM19 4v16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="volume-btn" title="音量">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-volume"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M15.54 8.46a5 5 0 010 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-mute" style="display:none"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M23 9l-6 6M17 9l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="progress-area">
        <span id="current-time">0:00</span>
        <div id="progress-bar-wrap">
          <div id="progress-bar-fill"></div>
          <input type="range" id="progress-bar" min="0" max="1000" value="0" step="1">
        </div>
        <span id="total-time">0:00</span>
      </div>
    </div>

    <div id="control-extra">
      <div id="volume-area">
        <input type="range" id="volume-bar" min="0" max="100" value="100" step="1">
        <span id="volume-percent">100%</span>
      </div>
    </div>
  </div>

  <audio id="audio-player"></audio>

  <div id="auth-modal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="auth-modal-title">登录</h2>
        <button id="auth-modal-close" class="modal-close">&times;</button>
      </div>
      <form id="auth-form">
        <div class="form-group">
          <label for="auth-username">用户名</label>
          <input type="text" id="auth-username" placeholder="请输入用户名" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="auth-password">密码</label>
          <input type="password" id="auth-password" placeholder="请输入密码" required autocomplete="current-password">
        </div>
        <button type="submit" id="auth-submit-btn" class="btn-primary">登录</button>
      </form>
      <div class="modal-footer">
        <span id="auth-switch-text">还没有账号？</span>
        <a href="#" id="auth-switch-btn">立即注册</a>
      </div>
      <div id="auth-error" class="auth-error" style="display:none"></div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="src/renderer/index.js"></script>
</body>
</html>
