<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLO音乐</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#31C27C" stroke-width="2"/><path d="M9 8v8l7-4z" fill="#31C27C"/></svg>
        <span>SOLO音乐</span>
      </div>
      <div id="sidebar-nav">
        <div class="nav-item active" id="nav-local">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v18M3 12h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
          <span>本地音乐</span>
        </div>
      </div>
      <div id="sidebar-playlist-header">
        <span>播放列表</span>
        <div id="playlist-actions">
          <button id="add-music-btn" title="添加音乐">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
          </button>
          <button id="add-folder-btn" title="添加文件夹">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 7V5a2 2 0 012-2h4l2 2h6a2 2 0 012 2v2M3 7h18a2 2 0 012 2v8a2 2 0 01-2 2H3a2 2 0 01-2-2V9a2 2 0 012-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="clear-list-btn" title="清空列表">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div id="playlist-list"></div>
    </div>

    <div id="main-content">
      <div id="player-view">
        <div id="album-section">
          <div id="album-disc">
            <div id="album-art">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M9 18V5l12-2v13" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><circle cx="6" cy="18" r="3" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><circle cx="18" cy="16" r="3" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></svg>
            </div>
          </div>
          <div id="song-detail">
            <div id="song-title">未在播放</div>
            <div id="song-artist">--</div>
          </div>
        </div>

        <div id="lyrics-section">
          <div id="lyrics-header">
            <span>歌词</span>
            <button id="load-lyric-btn">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
              加载歌词
            </button>
          </div>
          <div id="lyrics-content"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="control-bar">
    <div id="control-song-info">
      <div id="control-album-art">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 18V5l12-2v13" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/><circle cx="6" cy="18" r="3" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/><circle cx="18" cy="16" r="3" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/></svg>
      </div>
      <div id="control-song-text">
        <div id="control-song-title">未在播放</div>
        <div id="control-song-artist">--</div>
      </div>
    </div>

    <div id="control-center">
      <div id="control-buttons">
        <button id="mode-btn" title="顺序播放">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-sequential"><path d="M8 5l-5 5 5 5M16 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-loop-one" style="display:none"><path d="M17 1l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11V9a4 4 0 014-4h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M7 23l-4-4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 13v2a4 4 0 01-4 4H3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><text x="12" y="15" text-anchor="middle" font-size="8" font-weight="bold" fill="currentColor">1</text></svg>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-shuffle" style="display:none"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="prev-btn" title="上一首">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19 20L9 12l10-8v16zM5 4v16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="play-btn" title="播放">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon-play"><polygon points="6,3 20,12 6,21" fill="currentColor"/></svg>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon-pause" style="display:none"><rect x="5" y="3" width="4" height="18" rx="1" fill="currentColor"/><rect x="15" y="3" width="4" height="18" rx="1" fill="currentColor"/></svg>
        </button>
        <button id="next-btn" title="下一首">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M5 4l10 8-10 8V4zM19 4v16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="volume-btn" title="音量">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-volume"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M15.54 8.46a5 5 0 010 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="icon-mute" style="display:none"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M23 9l-6 6M17 9l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="progress-area">
        <span id="current-time">0:00</span>
        <div id="progress-bar-wrap">
          <div id="progress-bar-fill"></div>
          <input type="range" id="progress-bar" min="0" max="1000" value="0" step="1">
        </div>
        <span id="total-time">0:00</span>
      </div>
    </div>

    <div id="control-extra">
      <div id="volume-area">
        <input type="range" id="volume-bar" min="0" max="100" value="100" step="1">
        <span id="volume-percent">100%</span>
      </div>
    </div>
  </div>

  <audio id="audio-player"></audio>
  <script src="renderer.js"></script>
</body>
</html>
